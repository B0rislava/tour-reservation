<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>
<body class="profile-layout">
    <!-- Top Menu -->
    <header class="navbar"></header>

    <main class="profile-container">
        <div class="profile-card-compact" id="profile-card" style="display: none;">
            <div class="profile-avatar-lg" id="profile-initial"></div>
            <h2 id="profile-name"></h2>
            <p id="profile-email"></p>
            <p id="profile-bio" style="margin-top: 1rem; font-style: italic;"></p>

            <div class="profile-actions" id="profile-actions">
                <button class="btn-book" onclick="toggleEditForm()">Edit Profile</button>
                <button class="btn-secondary" onclick="logout()" style="text-decoration: none;">Logout</button>
            </div>
            <div id="delete-action-container" style="margin-top: 1.5rem;">
                <button class="btn-secondary" onclick="deleteProfile()" style="color: #D64545; border-color: #D64545; width: 100%;">Delete Account</button>
            </div>

            <!-- Edit Form -->
            <form id="edit-profile-form" style="display: none; margin-top: 1.5rem; text-align: left;">
                <div class="form-group">
                    <label for="edit-firstName">First Name</label>
                    <input type="text" id="edit-firstName" required class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-lastName">Last Name</label>
                    <input type="text" id="edit-lastName" required class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-bio">Bio</label>
                    <textarea id="edit-bio" rows="3" class="form-control" style="resize: vertical;"></textarea>
                </div>
                <div class="profile-actions" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn-book" style="border: none; font-family: inherit;">Save Changes</button>
                    <button type="button" class="btn-secondary" onclick="toggleEditForm()">Cancel</button>
                </div>
            </form>
        </div>
        
        <div id="loading" style="text-align: center; margin-top: 2rem;">Loading profile...</div>
        <div id="error-msg" style="text-align: center; margin-top: 2rem; color: #D64545; display: none;">Error loading profile or unauthorized.</div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initNav('profile');
            
            try {
                const response = await fetch('/api/v1/users/profile');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('profile-initial').textContent = user.firstName.charAt(0).toUpperCase();
                    document.getElementById('profile-name').textContent = `${user.firstName} ${user.lastName}`;
                    document.getElementById('profile-email').textContent = user.email;
                    document.getElementById('profile-bio').textContent = user.bio || 'User bio goes here...';
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('profile-card').style.display = 'block';

                    // Populate edit form
                    document.getElementById('edit-firstName').value = user.firstName;
                    document.getElementById('edit-lastName').value = user.lastName;
                    document.getElementById('edit-bio').value = user.bio || '';
                } else {
                    throw new Error('Unauthorized');
                }
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => window.location.href = '/login.html', 2000);
            }
        });

        function toggleEditForm() {
            const form = document.getElementById('edit-profile-form');
            const actions = document.getElementById('profile-actions');
            const deleteAction = document.getElementById('delete-action-container');
            
            if (form.style.display === 'none') {
                form.style.display = 'block';
                actions.style.display = 'none';
                deleteAction.style.display = 'none';
            } else {
                form.style.display = 'none';
                actions.style.display = 'flex';
                deleteAction.style.display = 'block';
            }
        }

        document.getElementById('edit-profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            const dto = {
                firstName: document.getElementById('edit-firstName').value,
                lastName: document.getElementById('edit-lastName').value,
                bio: document.getElementById('edit-bio').value
            };

            try {
                const response = await fetch('/api/v1/users/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dto)
                });
                
                if (response.ok) {
                    const updatedUser = await response.json();
                    document.getElementById('profile-initial').textContent = updatedUser.firstName.charAt(0).toUpperCase();
                    document.getElementById('profile-name').textContent = `${updatedUser.firstName} ${updatedUser.lastName}`;
                    document.getElementById('profile-bio').textContent = updatedUser.bio || 'User bio goes here...';
                    
                    toggleEditForm();
                } else {
                    alert('Failed to update profile.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred while updating the profile.');
            } finally {
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        });

        async function deleteProfile() {
            if (!confirm('Are you sure? This will permanently delete your account, bookings, and tours.')) return;
            
            try {
                const response = await fetch('/api/v1/users/profile', {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('Goodbye! Your profile has been deleted.');
                    window.location.href = '/signup.html';
                } else {
                    alert('Failed to delete profile.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
            }
        }

        async function logout() {
            if (!confirm('Are you sure you want to logout?')) return;
            try {
                // Spring security default logout handles POST without any specific body.
                await fetch('/api/v1/auth/logout', { method: 'POST' });
                window.location.href = '/login.html?logout=true';
            } catch (e) {
                console.error('Logout failed', e);
            }
        }
    </script>
</body>
</html>
