<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>
<body class="profile-no-scroll">
    <!-- Top Menu -->
    <header class="navbar"></header>

    <main class="profile-container">
        <div class="profile-card-compact" id="profile-card" style="display: none;">
            <div class="profile-avatar-lg" id="profile-initial"></div>
            <h2 id="profile-name"></h2>
            <p id="profile-email"></p>
            <p id="profile-bio" style="margin-top: 1rem; font-style: italic;"></p>

            <div class="profile-actions">
                <button class="btn-book">Edit Profile</button>
                <button class="btn-secondary" onclick="logout()" style="text-decoration: none;">Logout</button>
            </div>
        </div>
        
        <div id="loading" style="text-align: center; margin-top: 2rem;">Loading profile...</div>
        <div id="error-msg" style="text-align: center; margin-top: 2rem; color: #D64545; display: none;">Error loading profile or unauthorized.</div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initNav('profile');
            
            try {
                const response = await fetch('/api/v1/users/profile');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('profile-initial').textContent = user.firstName.charAt(0).toUpperCase();
                    document.getElementById('profile-name').textContent = `${user.firstName} ${user.lastName}`;
                    document.getElementById('profile-email').textContent = user.email;
                    document.getElementById('profile-bio').textContent = user.bio || 'User bio goes here...';
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('profile-card').style.display = 'block';
                } else {
                    throw new Error('Unauthorized');
                }
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => window.location.href = '/login.html', 2000);
            }
        });

        async function logout() {
            if (!confirm('Are you sure you want to logout?')) return;
            try {
                // Spring security default logout handles POST without any specific body.
                await fetch('/api/v1/auth/logout', { method: 'POST' });
                window.location.href = '/login.html?logout=true';
            } catch (e) {
                console.error('Logout failed', e);
            }
        }
    </script>
</body>
</html>
