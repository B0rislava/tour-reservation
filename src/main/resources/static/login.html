<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-layout">
    <div class="login-card">
        <a href="/" class="login-logo">Tourly</a>
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to your account</p>

        <!-- Messages -->
        <div id="error-message" class="alert-error" style="display: none;"></div>
        <div id="success-message" class="alert-logout" style="display: none; background: #e0f8e9; color: #2e7d32;"></div>

        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label for="username">Email Address</label>
                <!-- the name "username" matches Spring Security's default parameter -->
                <input type="email" id="username" name="username" class="form-control" placeholder="name@example.com" required autofocus>
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="password" required>
            </div>
            <button type="submit" class="btn-book btn-block" style="margin-top: 1rem; padding: 1rem;">Sign In</button>
        </form>

        <p style="margin-top: 1.2rem; color: var(--text-secondary); font-size: 0.9rem;">
            Don't have an account? <a href="/signup.html" style="color: var(--accent); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                const successDiv = document.getElementById('success-message');
                successDiv.textContent = 'Registration successful! You can now log in.';
                successDiv.style.display = 'block';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Spring Security default login uses x-www-form-urlencoded
            const formData = new URLSearchParams(new FormData(e.target));

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    window.location.href = '/'; // Login successful, go home
                } else {
                    errorDiv.textContent = 'Invalid email or password.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'A network error occurred.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
