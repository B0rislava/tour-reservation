<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
    <!-- Top Menu -->
    <header class="navbar"></header>

    <main class="container">


        <!-- Dynamic Messages Container -->
        <div id="message-container"></div>

        <div class="booking-list" id="bookings-container">
            <div id="loading" style="text-align: center; padding: 3rem; color: var(--text-secondary);">Loading bookings...</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNav('bookings');
            fetchBookings();
        });

        async function fetchBookings() {
            try {
                const response = await fetch('/api/v1/bookings');
                if (response.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                if (response.ok) {
                    const bookings = await response.json();
                    renderBookings(bookings);
                } else {
                    showMessage('Failed to load bookings.', 'error');
                }
            } catch (e) {
                showMessage('A network error occurred.', 'error');
            }
        }

        function renderBookings(bookings) {
            const container = document.getElementById('bookings-container');
            
            if (!bookings || bookings.length === 0) {
                container.innerHTML = `
                <div class="warning-empty">
                    You haven't booked any tours yet.
                </div>`;
                return;
            }

            let html = '';
            bookings.forEach(booking => {
                const d = new Date(booking.bookingDate);
                const date = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                html += `
                <div class="booking-item">
                    <div class="booking-info">
                        <h3><a href="/tour-details.html?id=${booking.tourId}" style="text-decoration: none; color: inherit;">${booking.tourTitle}</a></h3>
                        <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">
                            <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg> Booked on: <span>${date}</span></span> |
                            <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg> Persons: <span>${booking.numberOfParticipants}</span></span> |
                            <span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> Total: <span>€${booking.totalPrice.toFixed(2)}</span></span>
                        </div>
                    </div>
                    <div class="booking-actions" style="display: flex; gap: 1rem; align-items: center;">
                        <span class="booking-status">${booking.status}</span>
                        <div style="margin: 0;">
                            <button class="btn-secondary" onclick="cancelBooking(${booking.id})">Cancel</button>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function cancelBooking(bookingId) {
            if (!confirm('Are you sure you want to cancel this booking? This action cannot be undone.')) return;
            
            try {
                const formData = new URLSearchParams();
                formData.append('bookingId', bookingId);

                const response = await fetch('/api/v1/bookings/cancel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRF-TOKEN': getCsrfToken()
                    },
                    body: JSON.stringify({ bookingId: bookingId })
                });

                if (response.ok) {
                    const json = await response.json();
                    showMessage(json.message || 'Booking successfully cancelled.', 'success');
                    fetchBookings(); // reload
                } else {
                    const json = await response.json();
                    showMessage(json.error || 'Failed to cancel.', 'error');
                }
            } catch (e) {
                showMessage('Network error during cancellation.', 'error');
            }
        }

        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            const bgClass = type === 'success' ? '#F0F7FF' : '#FFF0F0';
            const colorClass = type === 'success' ? '#4589D6' : '#D64545';
            
            container.innerHTML = `
                <div style="background: ${bgClass}; color: ${colorClass}; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; font-weight: 500;">
                    ${text}
                </div>
            `;
        }
    </script>
</body>
</html>
