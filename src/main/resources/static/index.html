<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourly | Discover</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
    <header class="navbar"></header>

    <main class="container">
        <section class="tours-grid" id="tours-container">
            <div class="warning-empty u-hidden" id="empty-warning">
                Oops! There are no tours available right now.
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNav('discover');
            fetchTours();
        });

        async function fetchTours() {
            try {
                const response = await fetch('/api/v1/tours');
                if (response.ok) {
                    const tours = await response.json();
                    
                    let favoriteIds = [];
                    let userRole = null;
                    const authRes = await checkAuth();
                    if (authRes.isAuthenticated) {
                        favoriteIds = await getUserFavorites();
                        userRole = authRes.user.role;
                    }
                    
                    renderTours(tours, favoriteIds, userRole);
                } else {
                    console.error('Failed to load tours');
                }
            } catch (error) {
                console.error('Error fetching tours:', error);
            }
        }

        function renderTours(tours, favoriteIds = [], userRole = null) {
            const container = document.getElementById('tours-container');
            const emptyWarning = document.getElementById('empty-warning');

            container.querySelectorAll('.tour-card').forEach(card => card.remove());

            if (!tours || tours.length === 0) {
                emptyWarning.style.display = 'block';
                return;
            }

            emptyWarning.style.display = 'none';
            let html = '';
            tours.forEach(tour => {
                const guideInitial = tour.guideName ? tour.guideName.charAt(0).toUpperCase() : 'G';
                const isFavorited = favoriteIds.includes(tour.id);
                
                const heartFilled = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" color="#e63946"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                const heartOutline = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" color="white"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>`;
                const heartIcon = isFavorited ? heartFilled : heartOutline;
                
                // Only show "Book Now" for travelers or unauthenticated users.
                // For ADMIN or GUIDE, show "View Details".
                const showHeart = (userRole === null || userRole === 'TRAVELER');
                const heartHtml = showHeart ? `<div class="heart-icon-interactive" data-favorited="${isFavorited}" onclick="toggleFavorite(${tour.id}, this)">${heartIcon}</div>` : '';
                
                const btnText = (userRole === 'ADMIN' || userRole === 'GUIDE') ? 'View Details' : 'Book Now';
                
                html += `
                <article class="tour-card">
                    <div class="card-image-wrapper">
                        <img src="${tour.imageUrl || 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&q=80&w=800'}" alt="${tour.title}" class="tour-image" />
                        ${heartHtml}
                    </div>
                    <div class="card-content">
                        <div class="title-row">
                            <h2 class="tour-title">
                                <a href="/tour-details.html?id=${tour.id}" style="text-decoration: none; color: inherit;">
                                    ${tour.title}
                                </a>
                            </h2>

                        </div>

                        <div class="tour-details">
                            <div class="detail-item">
                                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg></span> <span>${formatDate(tour.scheduledDate)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg></span> <span>${tour.location}</span>
                            </div>
                            <div class="detail-item">
                                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></span> <span>${formatDuration(tour.duration)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></span> 
                                <span>${tour.availableSpots} / ${tour.maxGroupSize}</span>
                            </div>
                        </div>

                        <div class="guide-box">
                            <div class="guide-avatar-wrapper">
                                <span class="guide-letter">${guideInitial}</span>
                            </div>
                            <div class="guide-info">
                                <div class="guide-name">${tour.guideName}</div>
                                <div class="guide-rating"><span class="star">★</span> 5.0</div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <div class="price-container">
                            <div class="price-amount">€<span>${tour.pricePerPerson}</span></div>
                            <div class="price-label">/person</div>
                        </div>
                        <a href="/tour-details.html?id=${tour.id}" class="btn-book">${btnText}</a>
                    </div>
                </article>
                `;
            });
            container.insertAdjacentHTML('beforeend', html);
        }
    </script>
</body>
</html>
