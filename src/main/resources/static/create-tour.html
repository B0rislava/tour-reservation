<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tour | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
    <header class="navbar"></header>

    <div class="container-center-md">
        <h1 class="login-title">Create a New Tour</h1>
        <p class="login-subtitle">Fill in the details below to offer a new experience to our travelers.</p>

        <form id="create-tour-form">
            <div id="error-msg" class="alert-danger u-hidden"></div>
            
            <div class="form-group">
                <label for="title">Tour Title</label>
                <input type="text" id="title" class="form-control" required placeholder="e.g. Secret Hidden Gems of Rome">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" class="form-control" rows="4" required placeholder="Describe what the travelers will experience..."></textarea>
            </div>

            <div class="u-flex-gap">
                <div class="form-group u-flex-1">
                    <label for="location">Location</label>
                    <input type="text" id="location" class="form-control" required placeholder="City or Region">
                </div>
                <div class="form-group u-flex-1">
                    <label for="duration">Duration</label>
                    <input type="text" id="duration" class="form-control" required placeholder="e.g. 3 hours, 2 days">
                </div>
            </div>

            <div class="u-flex-gap">
                <div class="form-group u-flex-1">
                    <label for="scheduledDate">Scheduled Date</label>
                    <input type="date" id="scheduledDate" class="form-control" required>
                </div>
                <div class="form-group u-flex-1">
                    <label for="startTime">Start Time</label>
                    <input type="time" id="startTime" class="form-control" required>
                </div>
            </div>

            <div class="u-flex-gap">
                <div class="form-group u-flex-1">
                    <label for="maxGroupSize">Max Group Size</label>
                    <input type="number" id="maxGroupSize" class="form-control" min="1" required placeholder="e.g. 15">
                </div>
                <div class="form-group u-flex-1">
                    <label for="pricePerPerson">Price Per Person (€)</label>
                    <input type="number" step="0.01" id="pricePerPerson" class="form-control" min="0" required placeholder="e.g. 45.00">
                </div>
            </div>

            <div class="form-group">
                <label for="meetingPoint">Meeting Point</label>
                <input type="text" id="meetingPoint" class="form-control" placeholder="Where will you wait for them?">
            </div>

            <div class="form-group">
                <label for="imageUrl">Image URL (Optional)</label>
                <input type="url" id="imageUrl" class="form-control" placeholder="https://...">
            </div>

            <button type="submit" class="btn-book" style="width: 100%; border-radius: 12px; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">Publish Tour</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tourId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            initNav('create-tour');
            
            // Limit the date picker to future dates only
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('scheduledDate').setAttribute('min', today);
            
            const { isAuthenticated, user } = await checkAuth();
            if (!isAuthenticated || user.role !== 'GUIDE') {
                window.location.href = '/';
                return;
            }

            if (tourId) {
                document.querySelector('.login-title').textContent = 'Edit Tour';
                document.querySelector('.login-subtitle').textContent = 'Update the details of your tour experience.';
                document.querySelector('button[type="submit"]').textContent = 'Update Tour';
                
                try {
                    const res = await fetch(`/api/v1/tours/${tourId}`);
                    if (res.ok) {
                        const tour = await res.json();
                        document.getElementById('title').value = tour.title;
                        document.getElementById('description').value = tour.description;
                        document.getElementById('location').value = tour.location;
                        document.getElementById('duration').value = tour.duration;
                        document.getElementById('maxGroupSize').value = tour.maxGroupSize;
                        document.getElementById('pricePerPerson').value = tour.pricePerPerson;
                        document.getElementById('meetingPoint').value = tour.meetingPoint || '';
                        document.getElementById('imageUrl').value = tour.imageUrl || '';
                        document.getElementById('scheduledDate').value = tour.scheduledDate || '';
                        let timeStr = tour.startTime || '';
                        if (timeStr && timeStr.length > 5 && timeStr.includes(':')) {
                            timeStr = timeStr.substring(0, 5);
                        }
                        document.getElementById('startTime').value = timeStr;
                    }
                } catch (err) {
                    console.error("Failed to load tour details", err);
                }
            }
        });

        document.getElementById('create-tour-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = tourId ? 'Updating...' : 'Publishing...';
            btn.disabled = true;

            const reqDto = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                location: document.getElementById('location').value,
                duration: document.getElementById('duration').value,
                maxGroupSize: parseInt(document.getElementById('maxGroupSize').value),
                pricePerPerson: parseFloat(document.getElementById('pricePerPerson').value),
                meetingPoint: document.getElementById('meetingPoint').value,
                scheduledDate: document.getElementById('scheduledDate').value,
                startTime: document.getElementById('startTime').value,
                imageUrl: document.getElementById('imageUrl').value || null
            };

            try {
                const url = tourId ? `/api/v1/tours/${tourId}` : '/api/v1/tours/guide/me';
                const method = tourId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'X-XSRF-TOKEN': getCsrfToken()
                        },
                    body: JSON.stringify(reqDto)
                });

                if (res.ok) {
                    window.location.href = '/my-tours.html';
                } else {
                    const data = await res.json();
                    document.getElementById('error-msg').textContent = data.error || 'Failed to save tour.';
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').textContent = 'An unexpected error occurred.';
                document.getElementById('error-msg').style.display = 'block';
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
