<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tours | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>

<body class="bookings-layout" style="background-color: #F8F9FA;">
    <header class="navbar"></header>

    <main class="container">

        <div id="loading" class="u-text-center u-padding-2">Loading your tours...</div>
        <div id="error-msg" class="u-text-center u-hidden" style="color: #D64545;">Error loading your tours.</div>

        <div id="empty-state" class="empty-state u-hidden">
            <h2>You haven't created any tours yet</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Start offering amazing experiences to
                travelers today.</p>
            <a href="/create-tour.html" class="btn-book" style="text-decoration: none; padding: 1rem 2rem;">Create Your
                First Tour</a>
        </div>

        <div class="tours-grid" id="tours-container"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initNav('my-tours');

            const { isAuthenticated, user } = await checkAuth();
            if (!isAuthenticated || user.role !== 'GUIDE') {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch('/api/v1/tours/guide/me');
                if (response.ok) {
                    const tours = await response.json();
                    document.getElementById('loading').style.display = 'none';
                    renderTours(tours);
                } else {
                    throw new Error('Failed to load tours');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        function renderTours(tours) {
            const container = document.getElementById('tours-container');
            const emptyState = document.getElementById('empty-state');

            container.innerHTML = '';

            if (tours.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            tours.forEach(tour => {
                const imageUrl = tour.imageUrl || 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&q=80&w=800';

                const cardHtml = `
                    <article class="tour-card">
                        <div class="card-image-wrapper">
                            <img src="${imageUrl}" alt="${tour.title}" class="tour-image" />
                            <div class="badge-spots">
                                ${tour.availableSpots} SPOTS LEFT
                            </div>
                        </div>
                        <div class="card-content">
                            <div class="title-row">
                                <h2 class="tour-title">
                                    <a href="/tour-details.html?id=${tour.id}" style="text-decoration: none; color: inherit;">
                                        ${tour.title}
                                    </a>
                                </h2>
                            </div>
                            
                            <div class="tour-details">
                                <div class="detail-item">
                                    <span class="icon">📍</span> <span>${tour.location}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="icon">⏱</span> <span>${tour.duration}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card-footer" style="padding: 1rem; border-top: 1px solid var(--border);">
                            <div style="display: flex; gap: 0.5rem; width: 100%;">
                                <a href="/create-tour.html?id=${tour.id}" class="btn-secondary btn-edit" 
                                   style="flex: 1; text-align: center; text-decoration: none; padding: 0.6rem; border-radius: 8px; border: none; font-weight: 700;">
                                   Edit
                                </a>
                                <button onclick="deleteTour(${tour.id})" class="btn-secondary btn-delete" 
                                        style="flex: 1; border: none; padding: 0.6rem; border-radius: 8px; font-weight: 700; cursor: pointer;">
                                    Delete
                                </button>
                            </div>
                        </div>
                    </article>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        async function deleteTour(id) {
            if (!confirm('Are you sure you want to delete this tour? This action cannot be undone.')) return;

            try {
                const res = await fetch(`/api/v1/tours/${id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    location.reload();
                } else {
                    alert('Failed to delete tour.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
            }
        }
    </script>
</body>

</html>
