<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>

<body class="bookings-layout" style="background-color: #F8F9FA;">
    <header class="navbar"></header>

    <main class="container">
        <div class="page-header" style="text-align: center; margin-bottom: 2rem;">
            <a href="/admin/dashboard.html" style="text-decoration: none; color: var(--accent); font-weight: 600; font-size: 0.9rem; text-transform: uppercase;">&larr; Back to Dashboard</a>
            <h1 style="font-size: 2.2rem; color: var(--text-primary); margin-top: 1rem;">User Management</h1>
        </div>

        <div class="tour-card" style="padding: 1.5rem; overflow-x: auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #F1F3F5;">
                        <th style="padding: 1rem;">User</th>
                        <th style="padding: 1rem;">Email</th>
                        <th style="padding: 1rem;">Role</th>
                        <th style="padding: 1rem; text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
            <div id="loading" style="text-align: center; padding: 2rem;">Loading users...</div>
            <div id="empty-state" style="text-align: center; padding: 2rem; display: none;">No users found.</div>
        </div>
    </main>

    <script>
        let currentUser = null;
        document.addEventListener('DOMContentLoaded', async () => {
            initNav('admin-dashboard');

            const { isAuthenticated, user } = await checkAuth();
            if (!isAuthenticated || user.role !== 'ADMIN') {
                window.location.href = '/';
                return;
            }
            currentUser = user;
            loadUsers();
        });

        async function loadUsers() {
            try {
                const response = await fetch('/api/v1/admin/users');
                if (response.ok) {
                    const users = await response.json();
                    renderUsers(users);
                }
            } catch (err) {
                console.error("Failed to load users", err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('user-list');
            const emptyState = document.getElementById('empty-state');
            list.innerHTML = '';
            
            if (users.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            users.forEach(u => {
                const isSelf = currentUser && currentUser.email === u.email;
                const row = document.createElement('tr');
                row.style.borderBottom = '1px solid #F1F3F5';
                row.innerHTML = `
                    <td style="padding: 1rem;">
                        <div style="font-weight: 600;">${u.firstName} ${u.lastName} ${isSelf ? '<span style="color: var(--accent); font-size: 0.7rem; vertical-align: middle; margin-left: 5px;">(YOU)</span>' : ''}</div>
                    </td>
                    <td style="padding: 1rem; color: var(--text-secondary);">${u.email}</td>
                    <td style="padding: 1rem;">
                        <span style="background: ${u.role === 'ADMIN' ? '#FFE8CC' : u.role === 'GUIDE' ? '#D3F9D8' : '#E7F5FF'}; 
                                     color: ${u.role === 'ADMIN' ? '#E67E22' : u.role === 'GUIDE' ? '#2F9E44' : '#1971C2'};
                                     padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700;">
                            ${u.role}
                        </span>
                    </td>
                    <td style="padding: 1rem; text-align: center;">
                        ${isSelf ? `
                            <button style="background: #f1f3f5; color: #adb5bd; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: not-allowed;" disabled title="You cannot delete your own account.">
                                Delete
                            </button>
                        ` : `
                            <button onclick="deleteUser(${u.id})" 
                                    style="background: #FFF0F0; color: #D64545; border: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer;">
                                Delete
                            </button>
                        `}
                    </td>
                `;
                list.appendChild(row);
            });
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
            
            try {
                const response = await fetch(`/api/v1/admin/users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadUsers();
                } else {
                    alert('Failed to delete user.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
            }
        }
    </script>
</body>

</html>
