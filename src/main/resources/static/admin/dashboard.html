<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>

<body class="bookings-layout" style="background-color: #F8F9FA;">
    <header class="navbar"></header>

    <main class="container">

        <div class="admin-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 2rem;">
            <div class="tour-card" style="padding: 2rem; text-align: center; cursor: pointer;" onclick="window.location.href='/admin/users.html'">
                <div style="display: flex; justify-content: center; margin-bottom: 1rem; color: var(--accent);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </div>
                <h2 style="margin-bottom: 1rem;">User Management</h2>
                <p style="color: var(--text-secondary);">View and delete users from the system.</p>
                <div style="margin-top: 1.5rem;"><span class="btn-book" style="display: inline-block;">Manage Users</span></div>
            </div>

            <div class="tour-card" style="padding: 2rem; text-align: center; cursor: pointer;" onclick="window.location.href='/admin/tours.html'">
                <div style="display: flex; justify-content: center; margin-bottom: 1rem; color: var(--accent);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <h2 style="margin-bottom: 1rem;">Tour Management</h2>
                <p style="color: var(--text-secondary);">Oversee and remove tours listed on the platform.</p>
                <div style="margin-top: 1.5rem;"><span class="btn-book" style="display: inline-block;">Manage Tours</span></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initNav('admin-dashboard');

            const { isAuthenticated, user } = await checkAuth();
            if (!isAuthenticated || user.role !== 'ADMIN') {
                window.location.href = '/';

            }
        });
    </script>
</body>

</html>
