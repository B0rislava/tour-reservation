<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Details | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
    <!-- Top Menu -->
    <header class="navbar"></header>

    <main class="container">
        <div id="loading" style="text-align: center; padding: 2rem; color: var(--text-secondary);">Loading tour details...</div>
        <div id="error-message" style="color: #ff6b6b; text-align: center; display: none;">Error loading tour details.</div>
        
        <div class="details-container" id="details-container" style="display: none;">
            <!-- Left Side: Images, Info, Guide -->
            <div class="details-content">
                <img id="tour-image" src="" alt="Tour Image" class="details-hero-img">

                <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem;">
                    <h1 class="details-title" id="tour-title" style="margin-bottom: 0;"></h1>
                    <div id="favorite-container"></div>

                </div>

                <div class="tour-details" style="margin-bottom: 2rem;">
                    <div class="detail-item">
                        <span class="icon" style="color: var(--text-secondary);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg></span> <span id="tour-datetime"></span>
                    </div>
                    <div class="detail-item">
                        <span class="icon" style="color: var(--text-secondary);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg></span> <span id="tour-location"></span>
                    </div>
                    <div class="detail-item" id="meeting-point-container" style="display: none;">
                        <span class="icon" style="color: var(--text-secondary);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></span> Meet at: <span id="tour-meetingpoint"></span>
                    </div>
                    <div class="detail-item">
                        <span class="icon" style="color: var(--text-secondary);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></span> <span id="tour-duration"></span>
                    </div>
                    <div class="detail-item">
                        <span class="icon" style="color: var(--text-secondary);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></span> 
                        <span><span id="tour-available"></span> / <span id="tour-max"></span></span>
                    </div>
                </div>

                <h3>About this tour</h3>
                <p id="tour-description" style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 2rem; line-height: 1.8;"></p>

                <h3>Your guide</h3>
                <div class="guide-box" style="margin-top: 1rem; max-width: 400px;">
                    <div class="guide-avatar-wrapper">
                        <span class="guide-letter" id="guide-initial">G</span>
                    </div>
                    <div class="guide-info">
                        <div class="guide-name" id="guide-name"></div>
                        <div class="guide-rating"><span class="star">★</span> 5.0</div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Booking Widget -->
            <div class="details-sidebar">
                <div class="booking-widget">
                    <div class="price-container" style="margin-bottom: 1.5rem;">
                        <div class="price-amount">€<span id="tour-price"></span></div>
                        <div class="price-label">/person</div>
                    </div>

                    <!-- Dynamic message container -->
                    <div id="booking-msg" style="display: none; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-weight: 500;"></div>

                    <div id="booking-form-container"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentTourId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initNav('discover');
            
            const urlParams = new URLSearchParams(window.location.search);
            currentTourId = urlParams.get('id');

            if (!currentTourId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-message').textContent = 'Tour not found.';
                document.getElementById('error-message').style.display = 'block';
                return;
            }

            fetchTourDetails();
        });

        async function fetchTourDetails() {
            try {
                const response = await fetch(`/api/v1/tours/${currentTourId}`);
                if (response.ok) {
                    const tour = await response.json();
                    renderTourDetails(tour);
                } else {
                    throw new Error('Failed to load tour');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-message').style.display = 'block';
            }
        }

        async function renderTourDetails(tour) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('details-container').style.display = 'flex';

            document.getElementById('tour-image').src = tour.imageUrl || 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&q=80&w=1200';
            document.getElementById('tour-title').textContent = tour.title;

            let timeStr = tour.startTime || 'TBA';
            if (timeStr && timeStr.length > 5 && timeStr.includes(':')) {
                timeStr = timeStr.substring(0, 5); // Example: 08:00:00 -> 08:00
            }
            
            let dateStr = tour.scheduledDate || 'TBD';
            try {
                const d = new Date(tour.scheduledDate);
                if (!isNaN(d.getTime())) {
                    dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                }
            } catch(e) {}
            
            document.getElementById('tour-datetime').textContent = `${dateStr} at ${timeStr}`;
            document.getElementById('tour-location').textContent = tour.location;
            
            if (tour.meetingPoint) {
                document.getElementById('meeting-point-container').style.display = 'flex';
                document.getElementById('tour-meetingpoint').textContent = tour.meetingPoint;
            }
            
            function formatDuration(d) {
                if (!d) return '';
                if (d.includes(':')) {
                    const parts = d.split(':');
                    const h = parseInt(parts[0], 10);
                    const m = parseInt(parts[1], 10);
                    return `${h > 0 ? h + ' hours' : ''}${h > 0 && m > 0 ? ' ' : ''}${m > 0 ? m + ' mins' : ''}`.trim();
                }
                return d;
            }
            document.getElementById('tour-duration').textContent = formatDuration(tour.duration);
            document.getElementById('tour-available').textContent = tour.availableSpots;
            document.getElementById('tour-max').textContent = tour.maxGroupSize;
            document.getElementById('tour-description').textContent = tour.description;
            
            document.getElementById('guide-name').textContent = tour.guideName;
            document.getElementById('guide-initial').textContent = tour.guideName ? tour.guideName.charAt(0).toUpperCase() : 'G';
            document.getElementById('tour-price').textContent = tour.pricePerPerson;

            // Render right side widget based on authentication
            const { isAuthenticated, user } = await checkAuth();
            const widgetContainer = document.getElementById('booking-form-container');

            if (isAuthenticated) {
                if (user && (user.role === 'GUIDE' || user.role === 'ADMIN')) {
                    const message = user.role === 'ADMIN' ? 'As an Administrator, you cannot book tours.' : 'As a Tour Guide, you cannot book tours.';
                    widgetContainer.innerHTML = `<div style="text-align:center; padding: 1rem; color: var(--price-color); background: var(--rating-bg); border-radius: 12px; font-weight: 600;">${message}</div>`;
                } else {
                    widgetContainer.innerHTML = `
                        <form id="booking-form">
                            <div class="form-group">
                                <label for="participants">Participants</label>
                                <select class="form-control" name="participants" id="participants">
                                    <option value="1">1 Person</option>
                                    <option value="2">2 Persons</option>
                                    <option value="3">3 Persons</option>
                                    <option value="4">4 Persons</option>
                                    <option value="5">5 Persons</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-book btn-block">Confirm Booking</button>
                        </form>
                    `;

                    document.getElementById('booking-form').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        
                        const participants = document.getElementById('participants').value;
                        try {
                            const res = await fetch('/api/v1/bookings/create', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ 
                                    tourId: parseInt(currentTourId), 
                                    participants: parseInt(participants) 
                                })
                            });

                            const msgDiv = document.getElementById('booking-msg');
                            const data = await res.json();
                            msgDiv.style.display = 'block';

                            if (res.ok) {
                                msgDiv.style.background = '#e0f8e9';
                                msgDiv.style.color = '#2e7d32';
                                msgDiv.textContent = data.message || 'Booking successful!';
                                
                                // Re-fetch tour details to display updated available capacity
                                fetchTourDetails();
                            } else {
                                msgDiv.style.background = '#FFF0F0';
                                msgDiv.style.color = '#ff6b6b';
                                msgDiv.textContent = data.error || 'Booking failed.';
                            }
                        } catch (err) {
                            console.error('Booking err:', err);
                        }
                    });
                }
            } else {
                widgetContainer.innerHTML = `
                    <a href="/login.html" class="btn-book btn-block" style="display:block; text-align:center; text-decoration:none; padding: 1rem;">
                        Login to Book
                    </a>
                `;
            }

            // Favorite Logic
            if (isAuthenticated && user && user.role === 'TRAVELER') {
                try {
                    const favoriteIds = await getUserFavorites();
                    let isFavorited = favoriteIds.includes(tour.id);
                    
                    function updateFavoriteIcon() {
                        const heartFilled = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" color="#e63946"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                        const heartOutline = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" color="var(--text-secondary)"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>`;
                        
                        document.getElementById('favorite-container').innerHTML = `
                            <div style="cursor: pointer; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; background: #FFF1E6; border-radius: 50%; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" id="tour-fav-btn">
                                ${isFavorited ? heartFilled : heartOutline}
                            </div>
                        `;
                        
                        document.getElementById('tour-fav-btn').addEventListener('click', async () => {
                            const method = isFavorited ? 'DELETE' : 'POST';
                            try {
                                const response = await fetch('/api/v1/users/favorites/' + tour.id, { method: method });
                                if (response.ok) {
                                    isFavorited = !isFavorited;
                                    updateFavoriteIcon();
                                }
                            } catch (e) {
                                console.error("Error toggling favorite", e);
                            }
                        });
                    }
                    updateFavoriteIcon();
                } catch(err) {
                    console.error("Failed to load favorites for widget", err);
                }
            }
        }
    </script>
</body>
</html>
