spring:
  application:
    name: tour-reservation

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:tour_reservation}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect


app:
  security:
    admin-password: ${ADMIN_PASSWORD:admin123}
    guide-password: ${GUIDE_PASSWORD:secret123}

