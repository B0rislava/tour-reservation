<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <!-- Top Menu -->
    <header class="navbar">
        <a href="/" style="text-decoration: none; color: inherit;">
            <div class="logo">Tourly</div>
        </a>
        <nav class="nav-links">
            <a href="/">Discover</a>

            <th:block sec:authorize="isAuthenticated()">
                <a href="/bookings" class="active">Bookings</a>
                <a href="/profile">
                    <div class="profile-pic">
                        <span
                            th:text="${#strings.substring(#authentication.principal.firstName, 0, 1).toUpperCase()}">M</span>
                    </div>
                </a>
            </th:block>

            <th:block sec:authorize="isAnonymous()">
                <a href="/login" class="btn-book" style="padding: 0.5rem 1.5rem;">Login</a>
            </th:block>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">My Bookings</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Manage your upcoming and past trips.</p>

        <!-- Display success message after booking -->
        <div th:if="${param.success}"
            style="background: #e0f8e9; color: #2e7d32; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; font-weight: 500;">
            Booking confirmed successfully!
        </div>

        <div class="booking-list">
            <div th:if="${#lists.isEmpty(bookings)}"
                style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                You haven't booked any tours yet.
            </div>

            <!-- Iterate over real bookings -->
            <div class="booking-item" th:each="booking : ${bookings}">
                <div class="booking-info">
                    <h3><a th:href="@{/tours/{id}(id=${booking.tourId})}" style="text-decoration: none; color: inherit;"
                            th:text="${booking.tourTitle}">Tour Title</a></h3>
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">
                        <span>📅 Booked on: <span
                                th:text="${#temporals.format(booking.bookingDate, 'yyyy-MM-dd HH:mm')}">2026-04-15</span></span>
                        |
                        <span>👥 Persons: <span th:text="${booking.numberOfParticipants}">2</span></span>
                    </div>
                </div>
                <div class="booking-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <span class="booking-status" th:text="${booking.status}">CONFIRMED</span>
                    <button class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
