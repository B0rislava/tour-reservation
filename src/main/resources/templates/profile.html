<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="profile-no-scroll">
    <!-- Top Menu -->
    <header class="navbar">
        <a href="/" style="text-decoration: none; color: inherit;">
            <div class="logo">Tourly</div>
        </a>
        <nav class="nav-links">
            <a href="/">Discover</a>

            <th:block sec:authorize="isAuthenticated()">
                <a href="/bookings">Bookings</a>
                <a href="/profile" class="active">
                    <div class="profile-pic">
                        <span
                            th:text="${#strings.substring(#authentication.principal.firstName, 0, 1).toUpperCase()}">M</span>
                    </div>
                </a>
            </th:block>

            <th:block sec:authorize="isAnonymous()">
                <a href="/login" class="btn-book" style="padding: 0.5rem 1.5rem;">Login</a>
            </th:block>
        </nav>
    </header>

    <main class="profile-container">
        <div class="profile-card-compact">
            <div class="profile-avatar-lg" th:text="${#strings.substring(user.firstName,0,1)}">M</div>
            <h2 th:text="${user.firstName + ' ' + user.lastName}">Maria Georgieva</h2>
            <p th:text="${user.email}">user@tourly.com</p>
            <p th:text="${user.bio}" style="margin-top: 1rem; font-style: italic;">User bio goes here...</p>

            <div class="profile-actions">
                <button class="btn-book">Edit Profile</button>
                <a href="/logout" class="btn-secondary" onclick="return confirm('Are you sure you want to logout?');"
                    style="text-decoration: none;">Logout</a>
            </div>
        </div>
    </main>
</body>

</html>
