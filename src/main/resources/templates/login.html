<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tourly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>

<body class="login-layout">
    <div class="login-card">
        <a href="/" class="login-logo">Tourly</a>
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to your account</p>

        <!-- Error message -->
        <div th:if="${param.error}" class="alert-error">
            Invalid email or password.
        </div>

        <!-- Logout message -->
        <div th:if="${param.logout}" class="alert-logout">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="form-group" style="text-align: left;">
                <label for="username">Email Address</label>
                <input type="email" id="username" name="username" class="form-control" placeholder="name@example.com"
                    required autofocus>
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="password"
                    required>
            </div>
            <button type="submit" class="btn-book btn-block" style="margin-top: 1rem; padding: 1rem;">Sign In</button>
        </form>

        <p style="margin-top: 1.2rem; color: var(--text-secondary); font-size: 0.9rem;">
            Don't have an account? <a href="#"
                style="color: var(--accent); font-weight: 600; text-decoration: none;">Sign
                Up</a>
        </p>
    </div>
</body>

</html>
